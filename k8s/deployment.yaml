---
apiVersion: v1
kind: Namespace
metadata:
  name: soapbox-cloud-console

---
apiVersion: v1
kind: Secret
metadata:
  name: soapbox-cloud-console-secrets
  namespace: soapbox-cloud-console
type: Opaque
stringData:
  NEXTAUTH_SECRET: "GSTzGzUw/3bGTYxaQ0pTlQ+oa+UAymEBa2HOvthfCn0="
  NEXTAUTH_URL: "https://cloud.soapboxsuperapp.com"
  SOAPBOX_API_URL: "https://api.soapboxsuperapp.com"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soapbox-cloud-console
  namespace: soapbox-cloud-console
  labels:
    app: soapbox-cloud-console
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soapbox-cloud-console
  template:
    metadata:
      labels:
        app: soapbox-cloud-console
    spec:
      containers:
        - name: soapbox-cloud-console
          image: ghcr.io/abdalkaderdev/soapbox-cloud-console:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: soapbox-cloud-console-secrets
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: soapbox-cloud-console-secrets
                  key: NEXTAUTH_URL
            - name: SOAPBOX_API_URL
              valueFrom:
                secretKeyRef:
                  name: soapbox-cloud-console-secrets
                  key: SOAPBOX_API_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      imagePullSecrets:
        - name: ghcr-auth

---
apiVersion: v1
kind: Service
metadata:
  name: soapbox-cloud-console
  namespace: soapbox-cloud-console
  labels:
    app: soapbox-cloud-console
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: soapbox-cloud-console

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soapbox-cloud-console
  namespace: soapbox-cloud-console
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cloud.soapboxsuperapp.com
      secretName: soapbox-cloud-console-tls
  rules:
    - host: cloud.soapboxsuperapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soapbox-cloud-console
                port:
                  number: 80
